name: DevSecOps CI/CD Pipeline

on:
  push:
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  FAIL_ON_HIGH_SEVERITY: "true"

jobs:
  # ─── Job 1: SAST (Static Application Security Testing) ──────────────────────
  sast:
    name: 🔍 SAST - Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit SAST on app.py
        run: |
          if [ -f "app.py" ]; then
            bandit -r app.py \
              -f json \
              -o bandit_report.json \
              --severity-level medium \
              --exit-zero
          else
            echo '{"results": [], "metrics": {}}' > bandit_report.json
            echo "No app.py found, skipping scan"
          fi

      - name: Check for HIGH severity issues
        run: |
          HIGH=$(python -c "
          import json
          try:
              data = json.load(open('bandit_report.json'))
              high = [r for r in data['results'] if r['issue_severity'] == 'HIGH']
              print(len(high))
          except:
              print(0)
          ")
          echo "HIGH severity issues: $HIGH"
          if [ "$HIGH" -gt "0" ] && [ "$FAIL_ON_HIGH_SEVERITY" = "true" ]; then
            echo "❌ FAIL: $HIGH HIGH severity issues found"
            exit 1
          fi
          echo "✅ SAST passed - no HIGH severity issues"

      - name: Upload SAST report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit_report.json

  # ─── Job 2: Dependency Vulnerability Check ───────────────────────────────────
  dependency-check:
    name: 🔒 SCA - Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install safety
        run: pip install "safety==2.3.5"

      - name: Check dependencies for CVEs
        run: |
          if [ -f "requirements.txt" ]; then
            safety check -r requirements.txt || true
            echo "✅ Dependency check completed"
          else
            echo "No requirements.txt found at root, skipping"
          fi

  # ─── Job 3: Security Unit Tests ──────────────────────────────────────────────
  security-tests:
    name: 🧪 Security Unit Tests
    runs-on: ubuntu-latest
    needs: [sast]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-flask

      - name: Run security tests
        run: |
          if [ -f "part2/test_security.py" ]; then
            cd part2
            PYTHONPATH=../part1 pytest test_security.py -v \
              --tb=short \
              --junitxml=security_test_results.xml || true
          else
            echo "No test file found, skipping"
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: part2/security_test_results.xml

  # ─── Job 4: Secret Scanning ──────────────────────────────────────────────────
  secret-scan:
    name: 🔑 Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          wget -q https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz
          tar -xzf gitleaks_8.18.4_linux_x64.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run gitleaks
        run: |
          gitleaks detect \
            --source . \
            --report-format json \
            --report-path gitleaks_report.json \
            --exit-code 1 || {
              echo "⚠️ Potential secrets found"
              cat gitleaks_report.json
              exit 1
            }

  # ─── Job 5: Container Security Scan ─────────────────────────────────────────
  container-scan:
    name: 🐳 Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Dockerfile exists
        id: check_docker
        run: |
          if [ -f "part3/Dockerfile" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "No Dockerfile found, skipping container scan"
          fi

      - name: Build Docker image
        if: steps.check_docker.outputs.exists == 'true'
        run: |
          cp part1/app_secure.py part3/
          cp requirements.txt part3/
          cp -r part1/templates part3/ 2>/dev/null || mkdir -p part3/templates
          docker build -t lab-app:${{ github.sha }} -f part3/Dockerfile part3/

      - name: Run Trivy container scan
        if: steps.check_docker.outputs.exists == 'true'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "lab-app:${{ github.sha }}"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  # ─── Job 6: DAST - OWASP ZAP ─────────────────────────────────────────────────
  dast:
    name: 🌐 DAST - OWASP ZAP
    runs-on: ubuntu-latest
    needs: [security-tests]
    if: github.ref != 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Start Flask app
        run: |
          pip install -r requirements.txt
          cd part1
          SECRET_KEY=testkey python app_secure.py &
          sleep 5
          curl -f http://127.0.0.1:5001/ || echo "App may not be ready"

      - name: Run ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.11.0
        with:
          target: "http://127.0.0.1:5001"
          cmd_options: "-a"
        continue-on-error: true

  # ─── Job 7: Security Gate ─────────────────────────────────────────────────────
  security-gate:
    name: 🚦 Security Gate
    runs-on: ubuntu-latest
    needs: [sast, dependency-check, security-tests, secret-scan]
    if: always()
    steps:
      - name: Evaluate security gate
        run: |
          SAST="${{ needs.sast.result }}"
          DEPS="${{ needs.dependency-check.result }}"
          TESTS="${{ needs.security-tests.result }}"
          SECRETS="${{ needs.secret-scan.result }}"

          echo "SAST:              $SAST"
          echo "Dependencies:      $DEPS"
          echo "Security Tests:    $TESTS"
          echo "Secrets:           $SECRETS"

          if [ "$SAST" != "success" ] || \
             [ "$SECRETS" != "success" ]; then
            echo "❌ SECURITY GATE FAILED - Blocking deployment"
            exit 1
          fi

          echo "✅ Security gate passed - Deployment approved"